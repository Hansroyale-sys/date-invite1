  
<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Date Invite 💖</title>  
  
<style>  
body {  
    margin: 0;  
    font-family: Arial, sans-serif;  
    text-align: center;  
    background: linear-gradient(135deg, #ff758c, #ff7eb3);  
    color: white;  
}  
  
.container {  
    padding: 30px;  
}  
  
h1 {  
    font-size: 28px;  
}  
  
img {  
    width: 90%;  
    max-width: 350px;  
    border-radius: 15px;  
    margin: 20px 0;  
}  
  
.buttons {  
    margin-top: 20px;  
    position: relative;  
    height: 250px; /* Increased space */  
}  
  
button {  
    padding: 15px 25px;  
    font-size: 18px;  
    border: none;  
    border-radius: 10px;  
    cursor: pointer;  
    position: absolute;  
}  
  
#yesBtn {  
    background: #28a745;  
    color: white;  
    left: 20%;  
}  
  
#noBtn {  
    background: #dc3545;  
    color: white;  
    left: 60%;  
}  
  
.options {  
    display: none;  
    margin-top: 30px;  
}  
  
.option {  
    background: white;  
    color: black;  
    margin: 10px;  
    padding: 12px;  
    border-radius: 12px;  
    font-weight: bold;  
}  
</style>  
  
</head>  
  
<body>  
  
<div class="container">  
  
<h1>Hey Boluwatife ❤️</h1>  
  
<img src="https://i.imgur.com/5k9sc8H.jpg">  
  
<h1>Will you go on a date with me? 😍</h1>  
  
<p>I’ve been thinking about you… let’s make some beautiful memories together 💕</p>  
  
<div class="buttons">  
    <button id="yesBtn">YES 😍</button>  
    <button id="noBtn">NO 🙄</button>  
</div>  
  
<div class="options" id="options">  
    <h2>Choose our vibe 😏</h2>  
    <div class="option">🍽️ Dinner</div>  
    <div class="option">🎬 Movie</div>  
    <div class="option">🧺 Picnic</div>  
    <div class="option">🌊 Beach</div>  
    <div class="option">🎮 Game Night</div>  
  
    <p><strong>Location:</strong> My crib 😌</p>  
</div>  
  
</div>  
  
<script>  
const noBtn = document.getElementById("noBtn");  
const yesBtn = document.getElementById("yesBtn");  
const options = document.getElementById("options");  
  
// Function to move NO button  
function moveNoButton() {  
    const x = Math.random() * 70;  
    const y = Math.random() * 150;  
    noBtn.style.left = x + "%";  
    noBtn.style.top = y + "px";  
}  
  
// Laptop hover  
noBtn.addEventListener("mouseover", moveNoButton);  
  
// iPhone touch (VERY IMPORTANT)  
noBtn.addEventListener("touchstart", (e) => {  
    e.preventDefault();  
    moveNoButton();  
});  
  
// YES button action  
yesBtn.addEventListener("click", () => {  
    alert("I knew you couldn’t say no 😏❤️");  
    document.querySelector(".buttons").style.display = "none";  
    options.style.display = "block";  
});  
</script>  
  
</body>  
</html>
